<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام إدارة الأوردرات</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Tahoma, Arial, sans-serif;}
body{background:#0f172a;color:#fff;padding:20px;}
.container{max-width:1400px;margin:auto;}
.header{background:linear-gradient(135deg,#2563eb,#06b6d4);padding:25px;border-radius:20px;margin-bottom:20px;box-shadow:0 10px 25px rgba(0,0,0,.3);}
.header h1{font-size:32px;}
.header p{margin-top:8px;opacity:.9;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-bottom:20px;}
.card{background:#1e293b;padding:20px;border-radius:15px;box-shadow:0 5px 15px rgba(0,0,0,.3);}
.card h2{font-size:15px;color:#94a3b8;margin-bottom:10px;}
.card span{font-size:28px;font-weight:bold;}
.form-box{background:#1e293b;padding:20px;border-radius:15px;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px;}
input,select,textarea{width:100%;padding:12px;border:none;outline:none;border-radius:10px;background:#334155;color:#fff;}
textarea{height:100px;resize:none;}
.btn{background:#2563eb;color:#fff;border:none;padding:12px;border-radius:10px;cursor:pointer;font-weight:bold;}
.search{margin-bottom:20px;}
.orders{display:grid;gap:15px;}
.order{background:#1e293b;padding:20px;border-radius:15px;border-right:6px solid #facc15;}
.order.done{border-right-color:#22c55e;}
.empty{text-align:center;padding:40px;background:#1e293b;border-radius:15px;color:#94a3b8;}
.footer{text-align:center;margin-top:30px;color:#64748b;}
</style>
</head>
<body>

<div class="container">
<div class="header">
<h1>منصه ENG.TAMER</h1>
</div>

<div class="stats">
<div class="card"><h2>إجمالي الأوردرات</h2><span id="totalOrders">0</span></div>
<div class="card"><h2>تم التنفيذ</h2><span id="doneOrders">0</span></div>
<div class="card"><h2>قيد التنفيذ</h2><span id="pendingOrders">0</span></div>
<div class="card"><h2>إجمالي المبيعات</h2><span id="totalSales">0</span></div>
</div>

<div class="form-box">
<h2>إضافة أوردر جديد</h2>
<div class="grid">
<input type="text" id="clientName" placeholder="اسم العميل">
<input type="text" id="clientPhone" placeholder="رقم العميل">
<input type="number" id="orderPrice" placeholder="سعر الطلب">
</div>
<br>
<textarea id="orderDetails" placeholder="تفاصيل الطلب"></textarea>
<br><br>
<button class="btn" onclick="addOrder()">إضافة الأوردر</button>
</div>

<div class="search">
<input type="text" id="searchInput" placeholder="البحث عن عميل..." onkeyup="renderOrders()">
</div>

<div id="ordersContainer" class="orders"></div>
<div class="footer">نظام إدارة الأوردرات © 2026</div>
</div>

<script>
let orders = JSON.parse(localStorage.getItem("orders")) || [];

function saveData(){localStorage.setItem("orders",JSON.stringify(orders));}

function addOrder(){
let name=document.getElementById("clientName").value;
let phone=document.getElementById("clientPhone").value;
let price=document.getElementById("orderPrice").value;
let details=document.getElementById("orderDetails").value;

if(!name||!phone||!price||!details){alert("أكمل جميع البيانات");return;}

let now=new Date();
orders.unshift({
id:Date.now(),name,phone,price,details,
date:now.toLocaleDateString('ar-EG'),
time:now.toLocaleTimeString('ar-EG'),
status:"pending"
});

saveData();
document.getElementById("clientName").value="";
document.getElementById("clientPhone").value="";
document.getElementById("orderPrice").value="";
document.getElementById("orderDetails").value="";
renderOrders();
}

function markDone(id){
orders=orders.map(o=>{if(o.id===id)o.status="done"; return o;});
saveData(); renderOrders();
}

function deleteOrder(id){
if(confirm("حذف الأوردر؟")){
orders=orders.filter(o=>o.id!==id);
saveData(); renderOrders();
}
}

function renderOrders(){
let search=document.getElementById("searchInput").value.toLowerCase();
let container=document.getElementById("ordersContainer");
let filtered=orders.filter(o=>o.name.toLowerCase().includes(search));
container.innerHTML="";

if(filtered.length===0){
container.innerHTML='<div class="empty">لا توجد أوردرات</div>';
}

filtered.forEach(order=>{
container.innerHTML+=`
<div class="order ${order.status==="done"?"done":""}">
<h3>${order.name}</h3>
<p>📞 ${order.phone}</p>
<p>📝 ${order.details}</p>
<p>💰 ${order.price} ج</p>
<p>📅 ${order.date}</p>
<p>⏰ ${order.time}</p>
<p>${order.status==="done"?"🟢 تم التنفيذ":"🟡 قيد التنفيذ"}</p>
<button class="btn" onclick="markDone(${order.id})">تم التنفيذ</button>
<button class="btn" onclick="deleteOrder(${order.id})">حذف</button>
</div>`;
});

updateStats();
}

function updateStats(){
document.getElementById("totalOrders").innerText=orders.length;
document.getElementById("doneOrders").innerText=orders.filter(x=>x.status==="done").length;
document.getElementById("pendingOrders").innerText=orders.filter(x=>x.status==="pending").length;
let total=orders.reduce((s,i)=>s+Number(i.price),0);
document.getElementById("totalSales").innerText=total+" ج";
}

renderOrders();
</script>

</body>
</html>
